#
# docker-compose.dev.yml
#
version: "3.8"
services:

  controller:
    container_name: api-service
    build:
      context: ./
      dockerfile: ./api_service/Dockerfile
    ports:
      - 8000:80
    restart: unless-stopped
    command: "uvicorn api_service.main:fastapi --reload --port 80 --host 0.0.0.0"
    volumes:
      - .:/netorc/
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 100M

  redis:
    container_name: redis
    image: redis:6.2-bullseye
    restart: unless-stopped
    depends_on:
      - controller
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 100M

  worker:
    container_name: worker-service
    build:
      context: ./
      dockerfile: ./worker_service/Dockerfile
    command: "watchmedo auto-restart -d worker_service/ -p '*.py' --recursive -- celery -A miscellaneous.addons worker --loglevel=INFO"
    volumes:
      - .:/netorc/
    depends_on:
      - controller
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 100M
